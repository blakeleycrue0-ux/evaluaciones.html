<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluaciones | Femenino Santa Ponsa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root {
  --white: #f5f2ec; --black: #080808; --purple: #c084fc;
  --purple-dark: #2d0a52; --gray: #a0a09a;
  --card-bg: #0f0f0f; --border: rgba(245,242,236,0.09);
  --red: #ef4444; --yellow: #f59e0b; --green: #22c55e;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9990;opacity:.35;}
.hidden{display:none!important;}
input,select,textarea,button{font-family:'Barlow',sans-serif;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 20px;gap:12px;}
.topbar-logo{height:32px;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.06em;}
.topbar-spacer{flex:1;}

/* LAYOUT */
.app-layout{display:flex;min-height:calc(100vh - 60px);}

/* SIDEBAR */
.sidebar{width:230px;flex-shrink:0;border-right:1px solid var(--border);padding:16px 10px;overflow-y:auto;}
.sidebar-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--gray);padding:0 8px;margin-bottom:10px;}
.player-btn{width:100%;text-align:left;padding:10px 10px;background:transparent;border:none;border-radius:4px;color:var(--white);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .2s;margin-bottom:2px;}
.player-btn:hover{background:rgba(192,132,252,.08);}
.player-btn.active{background:rgba(192,132,252,.14);color:var(--purple);}
.player-initial{width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;flex-shrink:0;color:var(--gray);}
.player-btn.active .player-initial{background:rgba(192,132,252,.2);color:var(--purple);}

/* MAIN */
.main-content{flex:1;padding:28px 32px;max-width:820px;overflow-y:auto;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center;gap:12px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:28px;opacity:.4;}
.empty-sub{font-size:14px;color:var(--gray);}

/* PLAYER */
.player-name-big{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,52px);line-height:.92;margin-bottom:8px;}
.player-pos-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--purple);background:rgba(192,132,252,.12);padding:4px 12px;border-radius:2px;margin-bottom:20px;}

/* SESSION BAR */
.session-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:24px;padding:14px 18px;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;}
.session-bar label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);}
.session-bar input[type="date"]{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--white);font-size:14px;padding:4px 0;outline:none;color-scheme:dark;}
.att-group{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;}
.att-btn{padding:6px 14px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--gray);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.att-btn.present{border-color:var(--green);background:rgba(34,197,94,.12);color:var(--green);}
.att-btn.absent{border-color:var(--red);background:rgba(239,68,68,.12);color:var(--red);}
.att-btn.injured{border-color:var(--yellow);background:rgba(245,158,11,.12);color:var(--yellow);}

/* EVAL SECTIONS */
.eval-section{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;margin-bottom:14px;overflow:hidden;}
.eval-section-header{padding:16px 22px;background:#111;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.eval-section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;}
.section-avg{font-family:'Bebas Neue',sans-serif;font-size:26px;}
.eval-section-body{padding:18px 22px;}
.skill-row{display:grid;grid-template-columns:160px 1fr 40px;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);}
.skill-row:last-of-type{border-bottom:none;}
.skill-name{font-size:13px;font-weight:500;}
.skill-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer;background:var(--border);}
.skill-slider::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--purple);cursor:pointer;}
.skill-val{font-family:'Bebas Neue',sans-serif;font-size:20px;text-align:center;}
.color-red{color:var(--red);} .color-yellow{color:var(--yellow);} .color-green{color:var(--green);}
.comment-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);display:block;margin:14px 0 7px;}
.comment-box{width:100%;padding:10px 12px;background:rgba(245,242,236,.03);border:1px solid var(--border);border-radius:4px;color:var(--white);font-size:13px;font-weight:300;line-height:1.6;resize:none;outline:none;height:80px;transition:border-color .3s;}
.comment-box:focus{border-color:var(--purple);}

/* SAVE BAR */
.save-bar{position:sticky;bottom:0;background:rgba(8,8,8,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;}
.save-status{font-size:12px;color:var(--gray);}
.save-status.saved{color:var(--green);}
.btn-save{padding:11px 28px;background:var(--purple);color:var(--black);border:none;border-radius:2px;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .3s;}
.btn-save:hover{background:#d8b4fe;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--border);border-radius:4px;padding:12px 20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* CONFIG BANNER */
.config-banner{background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.2);border-radius:4px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:rgba(192,132,252,.9);line-height:1.6;}
.config-banner a{color:var(--purple);}

/* MOBILE */
@media(max-width:700px){
  .app-layout{flex-direction:column;}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);padding:10px;max-height:180px;overflow-y:auto;}
  .main-content{padding:16px;}
  .skill-row{grid-template-columns:1fr 40px;}
  .skill-name{grid-column:1/-1;padding-bottom:2px;}
  .save-bar{padding:10px 16px;}
  .session-bar{flex-direction:column;align-items:flex-start;}
  .att-group{margin-left:0;}
}
</style>
</head>
<body>

<div class="topbar">
  <img src="Logoclub.png" class="topbar-logo" alt="" onerror="this.style.display='none'">
  <span class="topbar-title">Evaluaciones</span>
  <div class="topbar-spacer"></div>
</div>

<div class="app-layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-label" style="margin-bottom:10px">Jugadoras</div>
    <div id="playerList"><div style="font-size:12px;color:var(--gray);padding:8px">Cargando...</div></div>
  </div>

  <!-- MAIN -->
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div class="main-content" id="mainContent">
      <div class="empty-state" id="emptyState">
        <div class="empty-title">Selecciona una jugadora</div>
        <div class="empty-sub">Elige del panel para evaluar</div>
      </div>
      <div id="playerPanel" class="hidden"></div>
    </div>
    <div class="save-bar hidden" id="saveBar">
      <span class="save-status" id="saveStatus">Sin cambios</span>
      <button class="btn-save" onclick="saveEval()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   PON AQUÍ TU GOOGLE SHEETS CSV con columnas: nombre, posicion
   ================================================================ */
const SHEETS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR2T9BCW-_d1I5dFfPBQtIPVTkBE_vOGC0pUZVOM4iY-0yBz3KfBVLOBSqnGudEWcPHorn62BQxYbrp/pub?output=csv';

const SECTIONS = [
  { id:'tecnica',  label:'Técnica',         skills:['Control y pase','Conducción','Remate','Juego aéreo','Técnica defensiva'] },
  { id:'fisica',   label:'Física',           skills:['Velocidad','Resistencia','Fuerza','Coordinación','Salto'] },
  { id:'tactica',  label:'Táctica',          skills:['Posicionamiento','Presión','Transiciones','Juego sin balón','Lectura del juego'] },
  { id:'mental',   label:'Mental y Actitud', skills:['Concentración','Liderazgo','Trabajo en equipo','Actitud competitiva','Respuesta a errores'] }
];

let players = [];
let selectedPlayer = null;
let currentDate = new Date().toISOString().split('T')[0];
let evalData = {};
let attendance = null;
let dirty = false;

/* CARGAR JUGADORAS */
async function loadPlayers() {
  try {
    const res  = await fetch(SHEETS_CSV + '&t=' + Date.now());
    const text = await res.text();
    const data = Papa.parse(text, { header:true, skipEmptyLines:true }).data;
    players = data.map((r,i) => ({
      id: i,
      name: (r.nombre || r.Nombre || r.name || Object.values(r)[0] || '').trim(),
      position: (r.posicion || r.Posicion || r.position || Object.values(r)[1] || '').trim()
    })).filter(p => p.name);
  } catch(e) {
    players = [];
  }
  renderPlayerList();
}

function renderPlayerList() {
  document.getElementById('playerList').innerHTML = players.length
    ? players.map(p => `
        <button class="player-btn ${selectedPlayer?.id===p.id?'active':''}" onclick="selectPlayer(${p.id})">
          <div class="player-initial">${p.name.charAt(0).toUpperCase()}</div>
          ${p.name}
        </button>`).join('')
    : '<div style="font-size:12px;color:var(--gray);padding:8px">Sin jugadoras.<br>Añádelas en Google Sheets.</div>';
}

function selectPlayer(id) {
  if (dirty && !confirm('Tienes cambios sin guardar. ¿Continuar?')) return;
  selectedPlayer = players.find(p => p.id === id);
  dirty = false;
  loadEval();
  renderPlayerPanel();
  renderPlayerList();
}

/* EVAL — guardado en localStorage por jugadora+fecha */
function evalKey() {
  return `eval_${selectedPlayer.id}_${currentDate}`;
}

function loadEval() {
  const saved = localStorage.getItem(evalKey());
  if (saved) {
    const p = JSON.parse(saved);
    evalData   = p.data || {};
    attendance = p.attendance || null;
  } else {
    evalData = {}; attendance = null;
  }
}

function saveEval() {
  localStorage.setItem(evalKey(), JSON.stringify({ data: evalData, attendance }));
  dirty = false;
  const st = document.getElementById('saveStatus');
  st.textContent = 'Guardado';
  st.className = 'save-status saved';
  setTimeout(() => { st.textContent = 'Sin cambios'; st.className = 'save-status'; }, 2000);
  toast('Guardado correctamente');
}

/* RENDER */
function renderPlayerPanel() {
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('saveBar').classList.remove('hidden');
  const p = selectedPlayer;

  let html = `
    <div class="player-name-big">${p.name}</div>
    <span class="player-pos-tag">${p.position || 'Sin posición'}</span>
    <div class="session-bar">
      <label>Sesión</label>
      <input type="date" value="${currentDate}" onchange="onDateChange(this.value)" style="color-scheme:dark">
      <div class="att-group">
        <button class="att-btn ${attendance==='present'?'present':''}" onclick="setAtt('present',this)">Presente</button>
        <button class="att-btn ${attendance==='absent'?'absent':''}"   onclick="setAtt('absent',this)">Falta</button>
        <button class="att-btn ${attendance==='injured'?'injured':''}" onclick="setAtt('injured',this)">Lesión</button>
      </div>
    </div>`;

  SECTIONS.forEach(sec => {
    const avg = sectionAvg(sec);
    html += `
      <div class="eval-section">
        <div class="eval-section-header">
          <span class="eval-section-title">${sec.label}</span>
          <span class="section-avg ${colorClass(avg)}" id="avg_${sec.id}">${avg>0?avg.toFixed(1):'-'}</span>
        </div>
        <div class="eval-section-body">
          ${sec.skills.map(sk => skillRow(sec.id, sk)).join('')}
          <label class="comment-label">Comentario</label>
          <textarea class="comment-box" placeholder="Observaciones..."
            onchange="setComment('${sec.id}',this.value)">${evalData[sec.id]?.comment||''}</textarea>
        </div>
      </div>`;
  });

  const panel = document.getElementById('playerPanel');
  panel.innerHTML = html;
  panel.classList.remove('hidden');

  SECTIONS.forEach(sec => {
    sec.skills.forEach(sk => {
      const sid = skId(sec.id, sk);
      const slider = document.getElementById('sl_'+sid);
      const valEl  = document.getElementById('vl_'+sid);
      if (!slider) return;
      slider.addEventListener('input', () => {
        const v = parseFloat(slider.value);
        valEl.textContent = v.toFixed(0);
        valEl.className = 'skill-val ' + colorClass(v);
        setSkill(sec.id, sk, v);
        const avg = sectionAvg(sec);
        const avgEl = document.getElementById('avg_'+sec.id);
        if (avgEl) { avgEl.textContent = avg>0?avg.toFixed(1):'-'; avgEl.className='section-avg '+colorClass(avg); }
        markDirty();
      });
    });
  });
}

function skId(secId, skill) {
  return (secId+'_'+skill).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
}

function skillRow(secId, skill) {
  const val = evalData[secId]?.[skill] ?? 5;
  const sid = skId(secId, skill);
  return `
    <div class="skill-row">
      <span class="skill-name">${skill}</span>
      <input type="range" class="skill-slider" id="sl_${sid}" min="0" max="10" step="0.5" value="${val}">
      <span class="skill-val ${colorClass(val)}" id="vl_${sid}">${parseFloat(val).toFixed(0)}</span>
    </div>`;
}

function sectionAvg(sec) {
  const vals = sec.skills.map(s => evalData[sec.id]?.[s]).filter(v => v!==undefined);
  if (!vals.length) return 0;
  return vals.reduce((a,b)=>a+parseFloat(b),0)/vals.length;
}

function colorClass(v) {
  if (!v||v<5) return 'color-red';
  if (v<7)     return 'color-yellow';
  return 'color-green';
}

function setSkill(secId, sk, val) {
  if (!evalData[secId]) evalData[secId]={};
  evalData[secId][sk]=val;
}

function setComment(secId, val) {
  if (!evalData[secId]) evalData[secId]={};
  evalData[secId].comment=val;
  markDirty();
}

function setAtt(val, btn) {
  attendance=val;
  document.querySelectorAll('.att-btn').forEach(b=>b.className='att-btn');
  btn.classList.add(val);
  markDirty();
}

function onDateChange(val) {
  currentDate=val;
  loadEval();
  renderPlayerPanel();
}

function markDirty() {
  dirty=true;
  const st=document.getElementById('saveStatus');
  st.textContent='Sin guardar';
  st.className='save-status';
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

loadPlayers();
</script>
</body>
</html>
