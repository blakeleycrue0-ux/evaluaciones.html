<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluaciones | Femenino Santa Ponsa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  --white:#f5f2ec;--black:#080808;--purple:#c084fc;
  --purple-dark:#2d0a52;--gray:#a0a09a;
  --card-bg:#0f0f0f;--border:rgba(245,242,236,0.09);
  --red:#ef4444;--yellow:#f59e0b;--green:#22c55e;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9990;opacity:.35;}
.hidden{display:none!important;}
input,select,textarea,button{font-family:'Barlow',sans-serif;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 20px;gap:14px;}
.topbar-logo{height:32px;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;}
.topbar-spacer{flex:1;}

/* NAV TABS */
.nav-tabs{display:flex;border-bottom:1px solid var(--border);background:#0a0a0a;}
.nav-tab{padding:13px 24px;border:none;background:transparent;color:var(--gray);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
.nav-tab.active{color:var(--purple);border-bottom-color:var(--purple);}
.nav-tab:hover{color:var(--white);}

/* TRIM BAR */
.trim-bar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);background:#0a0a0a;}
.trim-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);margin-right:4px;}
.trim-btn{padding:7px 18px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--gray);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.trim-btn.active{border-color:var(--purple);background:rgba(192,132,252,.12);color:var(--purple);}

/* LAYOUT */
.app-layout{display:flex;min-height:calc(100vh - 120px);}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;}
.team-block{border-bottom:1px solid var(--border);}
.team-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .2s;}
.team-header:hover{background:rgba(192,132,252,.05);}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.04em;}
.team-chevron{font-size:10px;color:var(--gray);transition:transform .3s;}
.team-block.open .team-chevron{transform:rotate(180deg);}
.team-players{display:none;padding:4px 8px 8px;}
.team-block.open .team-players{display:block;}
.player-btn{width:100%;text-align:left;padding:9px 10px;background:transparent;border:none;border-radius:4px;color:var(--white);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:9px;transition:background .2s;margin-bottom:1px;}
.player-btn:hover{background:rgba(192,132,252,.08);}
.player-btn.active{background:rgba(192,132,252,.14);color:var(--purple);}
.player-initial{width:24px;height:24px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:12px;flex-shrink:0;color:var(--gray);}
.player-btn.active .player-initial{background:rgba(192,132,252,.2);color:var(--purple);}
.player-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:auto;background:transparent;}
.dot-red{background:var(--red)!important;}
.dot-yellow{background:var(--yellow)!important;}
.dot-green{background:var(--green)!important;}

/* MAIN */
.main-content{flex:1;padding:28px 32px;overflow-y:auto;max-width:860px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center;gap:12px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:28px;opacity:.4;}
.empty-sub{font-size:14px;color:var(--gray);}

/* PLAYER HEADER */
.player-name-big{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,52px);line-height:.92;margin-bottom:8px;}
.player-pos-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--purple);background:rgba(192,132,252,.12);padding:4px 12px;border-radius:2px;margin-bottom:6px;}
.player-team-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);background:rgba(245,242,236,.05);padding:4px 12px;border-radius:2px;margin-bottom:20px;margin-left:6px;}

/* EVAL SECTIONS */
.session-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;padding:14px 18px;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;}
.session-bar label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);}
.att-group{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;}
.att-btn{padding:6px 14px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--gray);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.att-btn.present{border-color:var(--green);background:rgba(34,197,94,.12);color:var(--green);}
.att-btn.absent{border-color:var(--red);background:rgba(239,68,68,.12);color:var(--red);}
.att-btn.injured{border-color:var(--yellow);background:rgba(245,158,11,.12);color:var(--yellow);}
.eval-section{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;margin-bottom:14px;overflow:hidden;}
.eval-section-header{padding:16px 22px;background:#111;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.eval-section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;}
.section-avg{font-family:'Bebas Neue',sans-serif;font-size:26px;}
.eval-section-body{padding:18px 22px;}
.skill-row{display:grid;grid-template-columns:160px 1fr 40px;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);}
.skill-row:last-of-type{border-bottom:none;}
.skill-name{font-size:13px;font-weight:500;}
.skill-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer;background:var(--border);}
.skill-slider::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--purple);cursor:pointer;}
.skill-val{font-family:'Bebas Neue',sans-serif;font-size:20px;text-align:center;}
.color-red{color:var(--red);}.color-yellow{color:var(--yellow);}.color-green{color:var(--green);}
.comment-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);display:block;margin:14px 0 7px;}
.comment-box{width:100%;padding:10px 12px;background:rgba(245,242,236,.03);border:1px solid var(--border);border-radius:4px;color:var(--white);font-size:13px;font-weight:300;line-height:1.6;resize:none;outline:none;height:80px;transition:border-color .3s;}
.comment-box:focus{border-color:var(--purple);}
.private-box{background:rgba(45,10,82,.2);border:1px solid rgba(192,132,252,.2);border-radius:4px;padding:18px 22px;margin-bottom:14px;}
.private-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;margin-bottom:4px;}
.private-sub{font-size:12px;color:var(--gray);margin-bottom:12px;}

/* ASISTENCIA TAB */
.att-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.att-add-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.att-date-input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--white);font-size:14px;padding:6px 0;outline:none;color-scheme:dark;}
.att-state-select{background:#111;border:1px solid var(--border);border-radius:2px;color:var(--white);font-size:13px;padding:7px 12px;outline:none;cursor:pointer;}
.att-motivo-input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--white);font-size:14px;padding:6px 0;outline:none;flex:1;min-width:140px;}
.att-motivo-input::placeholder{color:rgba(160,160,154,.4);}
.btn-add-att{padding:8px 18px;background:var(--purple);color:var(--black);border:none;border-radius:2px;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.btn-add-att:hover{background:#d8b4fe;}

/* RESUMEN ASISTENCIA JUGADORA */
.att-summary{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.att-sum-item{padding:10px 18px;border-radius:4px;text-align:center;border:1px solid var(--border);background:var(--card-bg);min-width:80px;}
.att-sum-num{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
.att-sum-label{font-size:11px;color:var(--gray);margin-top:2px;}

/* LOG DE FALTAS */
.att-log{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.att-log-header{padding:14px 20px;background:#111;border-bottom:1px solid var(--border);display:grid;grid-template-columns:110px 100px 1fr 32px;gap:12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);}
.att-log-row{padding:13px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:110px 100px 1fr 32px;gap:12px;align-items:center;font-size:13px;transition:background .2s;}
.att-log-row:last-child{border-bottom:none;}
.att-log-row:hover{background:rgba(192,132,252,.04);}
.att-badge{display:inline-block;padding:3px 10px;border-radius:2px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.badge-present{background:rgba(34,197,94,.12);color:var(--green);}
.badge-absent{background:rgba(239,68,68,.12);color:var(--red);}
.badge-injured{background:rgba(245,158,11,.12);color:var(--yellow);}
.att-del{background:transparent;border:none;color:var(--gray);cursor:pointer;font-size:16px;padding:0;line-height:1;transition:color .2s;}
.att-del:hover{color:var(--red);}
.att-empty{padding:28px;text-align:center;color:var(--gray);font-size:14px;}

/* VISTA GENERAL ASISTENCIA (tab equipo) */
.team-att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
.team-att-card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:16px;cursor:pointer;transition:border-color .3s;}
.team-att-card:hover{border-color:rgba(192,132,252,.4);}
.team-att-name{font-size:14px;font-weight:600;margin-bottom:8px;}
.team-att-bars{display:flex;gap:4px;height:6px;border-radius:3px;overflow:hidden;}
.bar-green{background:var(--green);} .bar-red{background:var(--red);} .bar-yellow{background:var(--yellow);}
.team-att-stats{display:flex;gap:10px;margin-top:6px;font-size:12px;color:var(--gray);}

/* SAVE BAR */
.save-bar{position:sticky;bottom:0;background:rgba(8,8,8,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.save-status{font-size:12px;color:var(--gray);}
.save-status.saved{color:var(--green);}
.btn-save{padding:11px 28px;background:var(--purple);color:var(--black);border:none;border-radius:2px;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .3s;}
.btn-save:hover{background:#d8b4fe;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--border);border-radius:4px;padding:12px 20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* MOBILE */
@media(max-width:700px){
  .app-layout{flex-direction:column;}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:200px;overflow-y:auto;}
  .main-content{padding:16px;}
  .skill-row{grid-template-columns:1fr 40px;}
  .skill-name{grid-column:1/-1;padding-bottom:2px;}
  .save-bar{padding:10px 16px;}
  .session-bar{flex-direction:column;align-items:flex-start;}
  .att-group{margin-left:0;}
  .att-add-bar{flex-direction:column;align-items:flex-start;}
  .att-log-header,.att-log-row{grid-template-columns:90px 80px 1fr 28px;font-size:12px;}
  .trim-bar{flex-wrap:wrap;}
  .nav-tab{padding:11px 14px;font-size:11px;}
}
</style>
</head>
<body>

<div class="topbar">
  <img src="Logoclub.png" class="topbar-logo" alt="" onerror="this.style.display='none'">
  <span class="topbar-title">Evaluaciones</span>
  <div class="topbar-spacer"></div>
</div>

<!-- TABS -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('eval',this)">Evaluaciones</button>
  <button class="nav-tab" onclick="switchTab('asistencia',this)">Asistencia</button>
</div>

<!-- TRIM BAR (solo en eval) -->
<div class="trim-bar" id="trimBar">
  <span class="trim-label">Trimestre</span>
  <button class="trim-btn active" onclick="setTrim(1,this)">1º Trimestre</button>
  <button class="trim-btn" onclick="setTrim(2,this)">2º Trimestre</button>
  <button class="trim-btn" onclick="setTrim(3,this)">3º Trimestre</button>
</div>

<div class="app-layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div id="teamList"><div style="padding:16px;font-size:12px;color:var(--gray)">Cargando...</div></div>
  </div>

  <!-- MAIN -->
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div class="main-content" id="mainContent">
      <div class="empty-state" id="emptyState">
        <div class="empty-title">Selecciona una jugadora</div>
        <div class="empty-sub">Elige equipo y jugadora del panel</div>
      </div>
      <div id="evalPanel" class="hidden"></div>
      <div id="attPanel" class="hidden"></div>
    </div>
    <div class="save-bar hidden" id="saveBar">
      <span class="save-status" id="saveStatus">Sin cambios</span>
      <button class="btn-save" onclick="saveEval()">Guardar evaluación</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEETS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR2T9BCW-_d1I5dFfPBQtIPVTkBE_vOGC0pUZVOM4iY-0yBz3KfBVLOBSqnGudEWcPHorn62BQxYbrp/pub?output=csv';
const TEAM_ORDER = ['Autonomica','Juvenil','Cadete','Cadete 2','Alevin','Infantil'];
const SECTIONS = [
  {id:'tecnica', label:'Técnica',         skills:['Control y pase','Conducción','Remate','Juego aéreo','Técnica defensiva']},
  {id:'fisica',  label:'Física',           skills:['Velocidad','Resistencia','Fuerza','Coordinación','Salto']},
  {id:'tactica', label:'Táctica',          skills:['Posicionamiento','Presión','Transiciones','Juego sin balón','Lectura del juego']},
  {id:'mental',  label:'Mental y Actitud', skills:['Concentración','Liderazgo','Trabajo en equipo','Actitud competitiva','Respuesta a errores']}
];

let players=[], teams={}, selectedPlayer=null;
let currentTrim=1, currentTab='eval';
let evalData={}, attendance=null, dirty=false;

/* ── LOAD ── */
async function loadPlayers(){
  try{
    const res=await fetch(SHEETS_CSV+'&t='+Date.now());
    const text=await res.text();
    const data=Papa.parse(text,{header:true,skipEmptyLines:true}).data;
    players=data.map((r,i)=>({
      id:i,
      name:(r.nombre||r.Nombre||r.name||Object.values(r)[0]||'').trim(),
      position:(r.posicion||r.Posicion||r.position||Object.values(r)[1]||'').trim(),
      team:(r.equipo||r.Equipo||r.team||Object.values(r)[2]||'Sin equipo').trim()
    })).filter(p=>p.name);
  }catch(e){players=[];}
  teams={};
  players.forEach(p=>{if(!teams[p.team])teams[p.team]=[];teams[p.team].push(p);});
  renderSidebar();
}

/* ── SIDEBAR ── */
function renderSidebar(){
  const order=[...TEAM_ORDER,...Object.keys(teams).filter(t=>!TEAM_ORDER.includes(t))];
  const existing=order.filter(t=>teams[t]);
  document.getElementById('teamList').innerHTML=existing.map((team,ti)=>`
    <div class="team-block ${ti===0?'open':''}" id="team_${ti}">
      <div class="team-header" onclick="toggleTeam(${ti})">
        <span class="team-name">${team}</span>
        <span class="team-chevron">▼</span>
      </div>
      <div class="team-players">
        ${teams[team].map(p=>`
          <button class="player-btn ${selectedPlayer?.id===p.id?'active':''}"
            onclick="selectPlayer(${p.id})">
            <div class="player-initial">${p.name.charAt(0).toUpperCase()}</div>
            ${p.name}
            <div class="player-dot ${getDotClass(p.id)}" id="dot_${p.id}"></div>
          </button>`).join('')}
      </div>
    </div>`).join('')||'<div style="padding:16px;font-size:12px;color:var(--gray)">Añade jugadoras en Sheets</div>';
}

function toggleTeam(ti){document.getElementById('team_'+ti).classList.toggle('open');}

function getDotClass(pid){
  const saved=localStorage.getItem(`eval_${pid}_${currentTrim}`);
  if(!saved)return '';
  const avg=globalAvg(JSON.parse(saved).data||{});
  if(avg<=0)return '';
  if(avg<5)return 'dot-red';
  if(avg<7)return 'dot-yellow';
  return 'dot-green';
}

function globalAvg(data){
  let total=0,count=0;
  SECTIONS.forEach(sec=>sec.skills.forEach(sk=>{
    if(data[sec.id]?.[sk]!==undefined){total+=parseFloat(data[sec.id][sk]);count++;}
  }));
  return count?total/count:0;
}

/* ── TABS ── */
function switchTab(tab, btn){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('trimBar').style.display = tab==='eval'?'flex':'none';
  document.getElementById('saveBar').classList.add('hidden');
  if(selectedPlayer) renderCurrentTab();
  else showEmpty();
}

function showEmpty(){
  document.getElementById('emptyState').classList.remove('hidden');
  document.getElementById('evalPanel').classList.add('hidden');
  document.getElementById('attPanel').classList.add('hidden');
  document.getElementById('saveBar').classList.add('hidden');
}

function renderCurrentTab(){
  if(currentTab==='eval') renderEvalPanel();
  else renderAttPanel();
}

/* ── TRIMESTRE ── */
function setTrim(n,btn){
  if(dirty&&!confirm('Cambios sin guardar. ¿Continuar?'))return;
  currentTrim=n; dirty=false;
  document.querySelectorAll('.trim-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(selectedPlayer){loadEval();renderEvalPanel();}
  renderSidebar();
}

/* ── SELECT PLAYER ── */
function selectPlayer(id){
  if(dirty&&!confirm('Cambios sin guardar. ¿Continuar?'))return;
  selectedPlayer=players.find(p=>p.id===id);
  dirty=false;
  loadEval();
  renderSidebar();
  renderCurrentTab();
}

/* ── EVAL STORAGE ── */
function evalKey(){return `eval_${selectedPlayer.id}_${currentTrim}`;}
function loadEval(){
  const s=localStorage.getItem(evalKey());
  if(s){const p=JSON.parse(s);evalData=p.data||{};attendance=p.attendance||null;}
  else{evalData={};attendance=null;}
}
function saveEval(){
  localStorage.setItem(evalKey(),JSON.stringify({data:evalData,attendance,jugadora:selectedPlayer.name,equipo:selectedPlayer.team,trimestre:currentTrim}));
  dirty=false;
  const st=document.getElementById('saveStatus');
  st.textContent='Guardado';st.className='save-status saved';
  setTimeout(()=>{st.textContent='Sin cambios';st.className='save-status';},2000);
  const dot=document.getElementById('dot_'+selectedPlayer.id);
  if(dot)dot.className='player-dot '+getDotClass(selectedPlayer.id);
  toast('Evaluación guardada');
}

/* ── ASISTENCIA STORAGE ── */
function attKey(pid){return `att_${pid}`;}
function getAtt(pid){
  const s=localStorage.getItem(attKey(pid));
  return s?JSON.parse(s):[];
}
function saveAtt(pid,list){localStorage.setItem(attKey(pid),JSON.stringify(list));}

/* ── RENDER EVAL ── */
function renderEvalPanel(){
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('attPanel').classList.add('hidden');
  document.getElementById('saveBar').classList.remove('hidden');
  const p=selectedPlayer;
  const trimLabel=['','1º Trimestre','2º Trimestre','3º Trimestre'][currentTrim];
  let html=`
    <div class="player-name-big">${p.name}</div>
    <span class="player-pos-tag">${p.position||'Sin posición'}</span>
    <span class="player-team-tag">${p.team} · ${trimLabel}</span>
    <div class="session-bar">
      <label>Asistencia sesión</label>
      <div class="att-group">
        <button class="att-btn ${attendance==='present'?'present':''}" onclick="setAtt('present',this)">Presente</button>
        <button class="att-btn ${attendance==='absent'?'absent':''}"   onclick="setAtt('absent',this)">Falta</button>
        <button class="att-btn ${attendance==='injured'?'injured':''}" onclick="setAtt('injured',this)">Lesión</button>
      </div>
    </div>`;
  SECTIONS.forEach(sec=>{
    const avg=sectionAvg(sec);
    html+=`
      <div class="eval-section">
        <div class="eval-section-header">
          <span class="eval-section-title">${sec.label}</span>
          <span class="section-avg ${colorClass(avg)}" id="avg_${sec.id}">${avg>0?avg.toFixed(1):'-'}</span>
        </div>
        <div class="eval-section-body">
          ${sec.skills.map(sk=>skillRow(sec.id,sk)).join('')}
          <label class="comment-label">Comentario ${sec.label}</label>
          <textarea class="comment-box" placeholder="Observaciones..."
            onchange="setComment('${sec.id}',this.value)">${evalData[sec.id]?.comment||''}</textarea>
        </div>
      </div>`;
  });
  html+=`
    <div class="private-box">
      <div class="private-title">Comentario privado</div>
      <div class="private-sub">Solo visible para el entrenador</div>
      <textarea class="comment-box" placeholder="Notas privadas..." style="height:100px"
        onchange="setPrivate(this.value)">${evalData._private||''}</textarea>
    </div>`;
  const panel=document.getElementById('evalPanel');
  panel.innerHTML=html; panel.classList.remove('hidden');
  wireSlideres();
}

/* ── RENDER ASISTENCIA ── */
function renderAttPanel(){
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('evalPanel').classList.add('hidden');
  document.getElementById('saveBar').classList.add('hidden');
  const p=selectedPlayer;
  const list=getAtt(p.id);
  const total=list.length;
  const present=list.filter(a=>a.state==='present').length;
  const absent=list.filter(a=>a.state==='absent').length;
  const injured=list.filter(a=>a.state==='injured').length;
  const pct=total?Math.round(present/total*100):0;

  let html=`
    <div class="player-name-big">${p.name}</div>
    <span class="player-pos-tag">${p.position||''}</span>
    <span class="player-team-tag">${p.team}</span>

    <div class="att-summary">
      <div class="att-sum-item">
        <div class="att-sum-num" style="color:var(--green)">${present}</div>
        <div class="att-sum-label">Presentes</div>
      </div>
      <div class="att-sum-item">
        <div class="att-sum-num" style="color:var(--red)">${absent}</div>
        <div class="att-sum-label">Faltas</div>
      </div>
      <div class="att-sum-item">
        <div class="att-sum-num" style="color:var(--yellow)">${injured}</div>
        <div class="att-sum-label">Lesiones</div>
      </div>
      <div class="att-sum-item">
        <div class="att-sum-num" style="color:${pct>=75?'var(--green)':pct>=50?'var(--yellow)':'var(--red)'}">${pct}%</div>
        <div class="att-sum-label">Asistencia</div>
      </div>
    </div>

    <div class="att-header">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em">Registrar entrenamiento</div>
    </div>
    <div class="att-add-bar" style="margin-bottom:20px;padding:16px 18px;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
      <div>
        <div class="comment-label" style="margin-top:0">Fecha</div>
        <input type="date" id="newAttDate" class="att-date-input" value="${new Date().toISOString().split('T')[0]}">
      </div>
      <div>
        <div class="comment-label" style="margin-top:0">Estado</div>
        <select id="newAttState" class="att-state-select">
          <option value="present">Presente</option>
          <option value="absent">Falta</option>
          <option value="injured">Lesión</option>
        </select>
      </div>
      <div style="flex:1;min-width:140px;">
        <div class="comment-label" style="margin-top:0">Motivo (si falta/lesión)</div>
        <input type="text" id="newAttMotivo" class="att-motivo-input" placeholder="Ej: enfermedad, personal...">
      </div>
      <button class="btn-add-att" onclick="addAttRecord()">Añadir</button>
    </div>

    <div class="att-log">
      <div class="att-log-header">
        <span>Fecha</span><span>Estado</span><span>Motivo</span><span></span>
      </div>`;

  if(list.length===0){
    html+=`<div class="att-empty">Sin registros todavía</div>`;
  } else {
    [...list].sort((a,b)=>b.date.localeCompare(a.date)).forEach((rec,i)=>{
      const badgeClass=rec.state==='present'?'badge-present':rec.state==='absent'?'badge-absent':'badge-injured';
      const stateLabel=rec.state==='present'?'Presente':rec.state==='absent'?'Falta':'Lesión';
      const realIdx=list.findIndex(r=>r.date===rec.date&&r.state===rec.state&&r.motivo===rec.motivo);
      html+=`
        <div class="att-log-row">
          <span>${rec.date}</span>
          <span><span class="att-badge ${badgeClass}">${stateLabel}</span></span>
          <span style="color:var(--gray);font-size:12px">${rec.motivo||'-'}</span>
          <button class="att-del" onclick="deleteAtt(${realIdx})" title="Eliminar">×</button>
        </div>`;
    });
  }
  html+=`</div>`;

  const panel=document.getElementById('attPanel');
  panel.innerHTML=html; panel.classList.remove('hidden');
}

function addAttRecord(){
  const date=document.getElementById('newAttDate').value;
  const state=document.getElementById('newAttState').value;
  const motivo=document.getElementById('newAttMotivo').value.trim();
  if(!date)return;
  const list=getAtt(selectedPlayer.id);
  list.push({date,state,motivo});
  saveAtt(selectedPlayer.id,list);
  document.getElementById('newAttMotivo').value='';
  toast('Registro añadido');
  renderAttPanel();
}

function deleteAtt(idx){
  if(!confirm('¿Eliminar este registro?'))return;
  const list=getAtt(selectedPlayer.id);
  list.splice(idx,1);
  saveAtt(selectedPlayer.id,list);
  renderAttPanel();
}

/* ── SKILL HELPERS ── */
function wireSlideres(){
  SECTIONS.forEach(sec=>{
    sec.skills.forEach(sk=>{
      const sid=skId(sec.id,sk);
      const slider=document.getElementById('sl_'+sid);
      const valEl=document.getElementById('vl_'+sid);
      if(!slider)return;
      slider.addEventListener('input',()=>{
        const v=parseFloat(slider.value);
        valEl.textContent=v.toFixed(0);
        valEl.className='skill-val '+colorClass(v);
        setSkill(sec.id,sk,v);
        const avg=sectionAvg(sec);
        const avgEl=document.getElementById('avg_'+sec.id);
        if(avgEl){avgEl.textContent=avg>0?avg.toFixed(1):'-';avgEl.className='section-avg '+colorClass(avg);}
        markDirty();
      });
    });
  });
}

function skId(secId,skill){
  return(secId+'_'+skill).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
}

function skillRow(secId,skill){
  const val=evalData[secId]?.[skill]??5;
  const sid=skId(secId,skill);
  return`<div class="skill-row">
    <span class="skill-name">${skill}</span>
    <input type="range" class="skill-slider" id="sl_${sid}" min="0" max="10" step="0.5" value="${val}">
    <span class="skill-val ${colorClass(val)}" id="vl_${sid}">${parseFloat(val).toFixed(0)}</span>
  </div>`;
}

function sectionAvg(sec){
  const vals=sec.skills.map(s=>evalData[sec.id]?.[s]).filter(v=>v!==undefined);
  if(!vals.length)return 0;
  return vals.reduce((a,b)=>a+parseFloat(b),0)/vals.length;
}

function colorClass(v){
  if(!v||v<5)return 'color-red';
  if(v<7)return 'color-yellow';
  return 'color-green';
}

function setSkill(secId,sk,val){if(!evalData[secId])evalData[secId]={};evalData[secId][sk]=val;}
function setComment(secId,val){if(!evalData[secId])evalData[secId]={};evalData[secId].comment=val;markDirty();}
function setPrivate(val){evalData._private=val;markDirty();}
function setAtt(val,btn){
  attendance=val;
  document.querySelectorAll('.att-btn').forEach(b=>b.className='att-btn');
  btn.classList.add(val);
  markDirty();
}
function markDirty(){
  dirty=true;
  const st=document.getElementById('saveStatus');
  st.textContent='Sin guardar';st.className='save-status';
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

loadPlayers();
</script>
